<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FF Tính Điểm</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/canvas-confetti/1.9.2/confetti.browser.min.js"></script>
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #232738;
  --border: #2e3347;
  --gold: #f5c842;
  --orange: #ff7c20;
  --accent: #ff4d6d;
  --green: #2dd4a3;
  --text: #e8eaf0;
  --muted: #6b7280;
  --light: #9ca3b8;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Nunito', sans-serif;
  min-height: 100vh;
  padding-bottom: 40px;
}

/* ── HEADER ── */
header {
  background: linear-gradient(180deg, #12141f 0%, var(--bg) 100%);
  border-bottom: 1px solid var(--border);
  padding: 20px 16px 16px;
  text-align: center;
}

.header-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(245,200,66,0.12);
  border: 1px solid rgba(245,200,66,0.25);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 2px;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 10px;
}

h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(36px, 8vw, 56px);
  letter-spacing: 3px;
  background: linear-gradient(135deg, #f5c842, #ff7c20);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1;
}

.header-sub {
  margin-top: 6px;
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 1px;
}

/* ── CONTAINER ── */
.container { max-width: 800px; margin: 0 auto; padding: 20px 14px; }

/* ── TEAM INPUT ── */
.team-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.team-icon-wrap {
  width: 48px; height: 48px;
  background: rgba(245,200,66,0.12);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}

.team-card input {
  flex: 1;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-family: 'Nunito', sans-serif;
  font-size: 18px;
  font-weight: 800;
  padding: 10px 14px;
  outline: none;
  transition: border-color .15s;
  letter-spacing: 1px;
}
.team-card input::placeholder { color: var(--border); font-weight: 600; }
.team-card input:focus { border-color: var(--gold); }

/* ── GAME COUNT ── */
.section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.section-title {
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 2px;
  color: var(--muted);
  text-transform: uppercase;
}

.pills {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 22px;
}

.pill {
  cursor: pointer;
  width: 46px; height: 46px;
  border-radius: 12px;
  border: 2px solid var(--border);
  background: var(--surface);
  color: var(--muted);
  font-family: 'Nunito', sans-serif;
  font-size: 17px;
  font-weight: 800;
  display: flex; align-items: center; justify-content: center;
  transition: all .15s;
  user-select: none;
}

.pill:hover { border-color: var(--orange); color: var(--orange); }

.pill.active {
  background: linear-gradient(135deg, var(--gold), var(--orange));
  border-color: transparent;
  color: #1a0d00;
  box-shadow: 0 4px 14px rgba(255,124,32,0.35);
}

/* ── GAME CARDS ── */
.games-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 12px;
  margin-bottom: 22px;
}

.game-card {
  background: var(--surface);
  border: 2px solid var(--border);
  border-radius: 16px;
  padding: 14px;
  transition: border-color .2s, transform .2s;
  position: relative;
}

.game-card:hover { border-color: var(--surface2); transform: translateY(-2px); }
.game-card.filled { border-color: var(--surface2); }
.game-card.booyah-card { border-color: var(--gold) !important; }

.card-top-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
}

.game-label {
  font-size: 11px;
  font-weight: 800;
  letter-spacing: 2px;
  color: var(--muted);
  text-transform: uppercase;
}

.score-chip {
  background: var(--surface2);
  border: 1.5px solid var(--border);
  border-radius: 20px;
  padding: 3px 12px;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 18px;
  color: var(--muted);
  transition: all .2s;
  min-width: 60px;
  text-align: center;
}

.score-chip.active {
  border-color: var(--orange);
  color: var(--gold);
  background: rgba(255,124,32,0.1);
}

.score-chip.booyah {
  border-color: var(--gold);
  color: var(--gold);
  background: rgba(245,200,66,0.15);
}

/* ── INPUTS in card ── */
.fields-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

.field-wrap label {
  display: block;
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 1.5px;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 5px;
}

/* SELECT - hạng */
.field-wrap select {
  width: 100%;
  background: var(--surface2);
  border: 2px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-family: 'Nunito', sans-serif;
  font-size: 15px;
  font-weight: 700;
  padding: 9px 8px;
  outline: none;
  -webkit-appearance: none;
  cursor: pointer;
  transition: border-color .15s;
}
.field-wrap select:focus { border-color: var(--gold); }
.field-wrap select option { background: #1a1d27; }

/* ELIM INPUT - big and clear */
.elim-wrap {
  display: flex;
  align-items: center;
  background: var(--surface2);
  border: 2px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
  transition: border-color .15s;
}
.elim-wrap:focus-within { border-color: var(--gold); }

.elim-btn {
  width: 36px; height: 44px;
  background: transparent;
  border: none;
  color: var(--muted);
  font-size: 20px;
  font-weight: 900;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: color .1s, background .1s;
  flex-shrink: 0;
  user-select: none;
}
.elim-btn:hover { color: var(--text); background: rgba(255,255,255,0.06); }
.elim-btn:active { background: rgba(255,255,255,0.1); }

.elim-val {
  flex: 1;
  text-align: center;
  font-family: 'Nunito', sans-serif;
  font-size: 20px;
  font-weight: 900;
  color: var(--text);
  background: transparent;
  border: none;
  outline: none;
  width: 0;
  min-width: 0;
  padding: 0;
}

/* hide spinner */
.elim-val::-webkit-outer-spin-button,
.elim-val::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.elim-val[type=number] { -moz-appearance: textfield; }

.pts-hint {
  font-size: 11px;
  color: var(--muted);
  margin-top: 5px;
  font-weight: 600;
}
.pts-hint span { color: var(--green); }

/* ── SUMMARY ── */
.summary {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 20px;
  position: relative;
  overflow: hidden;
}

.summary::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--gold), var(--orange));
}

.summary-title {
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 2px;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 16px;
}

.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-bottom: 18px;
}

@media (max-width: 480px) {
  .stats-row { grid-template-columns: repeat(2, 1fr); }
}

.stat-box {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 8px;
  text-align: center;
}

.stat-val {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 34px;
  color: var(--text);
  line-height: 1;
}

.stat-lbl {
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 1.5px;
  color: var(--muted);
  text-transform: uppercase;
  margin-top: 2px;
}

.total-block {
  background: linear-gradient(135deg, rgba(245,200,66,0.08), rgba(255,124,32,0.08));
  border: 1px solid rgba(245,200,66,0.2);
  border-radius: 14px;
  padding: 16px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.total-label {
  font-size: 13px;
  font-weight: 800;
  letter-spacing: 2px;
  color: var(--muted);
  text-transform: uppercase;
}

.total-val {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 56px;
  line-height: 1;
  background: linear-gradient(135deg, var(--gold), var(--orange));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.btns-row { display: flex; gap: 10px; }

.btn-reset {
  flex: 1;
  padding: 12px;
  background: transparent;
  border: 2px solid var(--border);
  border-radius: 12px;
  color: var(--muted);
  font-family: 'Nunito', sans-serif;
  font-size: 15px;
  font-weight: 800;
  letter-spacing: 1px;
  cursor: pointer;
  transition: all .15s;
}
.btn-reset:hover { border-color: var(--accent); color: var(--accent); }

.btn-export {
  flex: 2;
  padding: 12px;
  background: linear-gradient(90deg, var(--gold), var(--orange));
  border: none;
  border-radius: 12px;
  color: #1a0d00;
  font-family: 'Nunito', sans-serif;
  font-size: 15px;
  font-weight: 900;
  letter-spacing: 1px;
  cursor: pointer;
  transition: opacity .15s, transform .1s;
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.btn-export:hover { opacity: 0.88; }
.btn-export:active { transform: scale(0.98); }

/* ── TOAST ── */
.toast {
  position: fixed;
  bottom: 28px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--green);
  color: #0a1a14;
  font-family: 'Nunito', sans-serif;
  font-size: 14px;
  font-weight: 800;
  padding: 12px 24px;
  border-radius: 30px;
  z-index: 9999;
  opacity: 0;
  transition: all .3s cubic-bezier(.34,1.56,.64,1);
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── BOOYAH anim ── */
@keyframes booyahanim {
  0%,100% { box-shadow: 0 0 0 transparent; }
  50% { box-shadow: 0 0 24px rgba(245,200,66,0.5); }
}
.booyah-flash { animation: booyahanim 1s ease-in-out 2; }

/* ── EXPORT CARD (off-screen) ── */
#exportCard {
  position: fixed;
  left: -9999px;
  top: 0;
  width: 820px;
  background: #09090b;
  font-family: 'Nunito', sans-serif;
  padding: 40px 44px;
}

.ec-header { display: flex; justify-content: space-between; align-items: flex-end; border-bottom: 2px solid var(--orange); padding-bottom: 18px; margin-bottom: 28px; }
.ec-logo { font-size: 12px; letter-spacing: 5px; color: var(--orange); text-transform: uppercase; margin-bottom: 6px; font-weight: 800; }
.ec-title { font-family: 'Bebas Neue', sans-serif; font-size: 48px; color: #fff; letter-spacing: 3px; line-height: 1; }
.ec-team-label { font-size: 11px; color: var(--muted); letter-spacing: 3px; text-transform: uppercase; margin-bottom: 4px; text-align: right; }
.ec-team { font-family: 'Bebas Neue', sans-serif; font-size: 40px; color: var(--gold); letter-spacing: 4px; text-align: right; }
.ec-games { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 28px; }
.ec-game { flex: 1 1 calc(20% - 10px); background: rgba(26,19,8,0.8); border-left: 3px solid #3d2e0e; padding: 10px 14px; min-width: 110px; }
.ec-game.booyah { border-left-color: var(--gold); background: rgba(245,200,66,0.06); }
.ec-game-num { font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
.ec-game-top { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: #fff; }
.ec-game-top.bt { color: var(--gold); }
.ec-game-elims { font-size: 13px; color: #888; font-weight: 700; }
.ec-game-score { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--orange); text-align: right; margin-top: 2px; }
.ec-summary-box { background: #110d07; border: 1px solid #3d2e0e; display: flex; align-items: stretch; }
.ec-stats-wrapper { flex: 1; display: grid; grid-template-columns: repeat(4,1fr); border-right: 1px solid #3d2e0e; }
.ec-stat { padding: 18px; text-align: center; border-right: 1px solid #2a2010; }
.ec-stat:last-child { border-right: none; }
.ec-stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 34px; color: #fff; line-height: 1; }
.ec-stat-lbl { font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-top: 4px; }
.ec-total { padding: 18px 36px; text-align: right; display: flex; flex-direction: column; justify-content: center; background: radial-gradient(circle at right, rgba(232,124,30,0.15), transparent); }
.ec-total-label { font-size: 12px; font-weight: 800; letter-spacing: 4px; color: var(--orange); text-transform: uppercase; }
.ec-total-val { font-family: 'Bebas Neue', sans-serif; font-size: 68px; line-height: 1; background: linear-gradient(135deg, var(--gold), var(--orange)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.ec-footer { display: flex; justify-content: space-between; margin-top: 22px; font-size: 10px; letter-spacing: 3px; color: #4a3a1a; text-transform: uppercase; font-weight: 700; }
.ec-watermark { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%) rotate(-10deg); font-family: 'Bebas Neue', sans-serif; font-size: 160px; color: rgba(255,255,255,0.018); white-space: nowrap; z-index: 0; pointer-events: none; letter-spacing: 10px; }
</style>
</head>
<body>

<header>
  <div class="header-badge">🔫 Free Fire · Esports</div>
  <h1>Tính Điểm Giải</h1>
  <div class="header-sub">1 Elim = 1 điểm &nbsp;·&nbsp; Top 1 = 12 điểm</div>
</header>

<div class="container">

  <!-- TÊN ĐỘI -->
  <div class="team-card">
    <div class="team-icon-wrap">⚔️</div>
    <input type="text" id="teamName" maxlength="30" placeholder="Tên đội của bạn..."
      oninput="updateTeamDisplay()" autocomplete="off">
  </div>

  <!-- SỐ GAME -->
  <div class="section-header">
    <div class="section-title">Số game bắn</div>
  </div>
  <div class="pills" id="pills"></div>

  <!-- CÁC GAME -->
  <div class="games-grid" id="gamesGrid"></div>

  <!-- TỔNG KẾT -->
  <div class="summary" id="summary">
    <div class="summary-title" id="summaryTitle">Tổng kết</div>
    <div class="stats-row" id="statsGrid"></div>
    <div class="total-block">
      <div class="total-label">Tổng điểm</div>
      <div class="total-val" id="grandTotal">0</div>
    </div>
    <div class="btns-row">
      <button class="btn-reset" onclick="resetAll()">↺ Làm lại</button>
      <button class="btn-export" onclick="exportImage()">📸 Xuất ảnh khoe</button>
    </div>
  </div>

</div>

<!-- EXPORT CARD (ẩn) -->
<div id="exportCard" style="position:relative;">
  <div class="ec-watermark" id="ec-watermark">XDORZY</div>
  <div class="ec-header">
    <div>
      <div class="ec-logo">Free Fire Esports</div>
      <div class="ec-title">MATCH RESULTS</div>
    </div>
    <div>
      <div class="ec-team-label">TEAM</div>
      <div class="ec-team" id="ec-team">—</div>
    </div>
  </div>
  <div class="ec-games" id="ec-games"></div>
  <div class="ec-summary-box">
    <div class="ec-stats-wrapper" id="ec-stats"></div>
    <div class="ec-total">
      <div class="ec-total-label">Grand Total</div>
      <div class="ec-total-val" id="ec-total-val">0</div>
    </div>
  </div>
  <div class="ec-footer">
    <div id="ec-date">TOURNAMENT SCORECARD</div>
    <div>GENERATED BY CUSTOM FF SYSTEM</div>
  </div>
</div>

<div class="toast" id="toast">✅ Đã lưu ảnh!</div>

<script>
const PLACEMENT_PTS = [12, 9, 8, 7, 6, 5, 4, 3, 2, 1, 0, 0];

function placePts(top) {
  if (!top || top < 1 || top > 12) return 0;
  return PLACEMENT_PTS[top - 1];
}

let numGames = 3;
let games = [];

function updateTeamDisplay() {
  const tn = document.getElementById('teamName').value.trim();
  document.getElementById('summaryTitle').textContent = tn ? `🔫 ${tn} – Tổng kết` : 'Tổng kết';
}

function initGames(n) {
  games = Array.from({length: n}, (_, i) => games[i] || {top: '', elims: 0});
  render();
}

function render() {
  // Pills
  const pillsEl = document.getElementById('pills');
  pillsEl.innerHTML = '';
  for (let i = 1; i <= 10; i++) {
    const p = document.createElement('div');
    p.className = 'pill' + (i === numGames ? ' active' : '');
    p.textContent = i;
    p.onclick = () => { numGames = i; initGames(i); };
    pillsEl.appendChild(p);
  }

  // Game cards
  const grid = document.getElementById('gamesGrid');
  grid.innerHTML = '';

  games.forEach((g, idx) => {
    const pp = g.top !== '' ? placePts(Number(g.top)) : 0;
    const elims = Number(g.elims) || 0;
    const score = pp + elims;
    const isBooyah = g.top == 1;
    const filled = g.top !== '' || elims > 0;

    const card = document.createElement('div');
    card.className = 'game-card' + (filled ? ' filled' : '') + (isBooyah ? ' booyah-card' : '');
    card.id = `card-${idx}`;

    let opts = `<option value="">— Chọn hạng —</option>`;
    opts += `<option value="1" ${g.top==1?'selected':''}>🏆 BOOYAH (Top 1)  +12đ</option>`;
    for (let t = 2; t <= 12; t++) {
      opts += `<option value="${t}" ${g.top==t?'selected':''}>#${t}  +${PLACEMENT_PTS[t-1]}đ</option>`;
    }

    let chipClass = 'score-chip';
    if (isBooyah) chipClass += ' booyah';
    else if (score > 0) chipClass += ' active';

    card.innerHTML = `
      <div class="card-top-row">
        <div class="game-label">Game ${idx + 1}</div>
        <div class="${chipClass}" id="badge-${idx}">${score > 0 ? score + 'đ' : '—'}</div>
      </div>
      <div class="fields-row">
        <div class="field-wrap">
          <label>Hạng</label>
          <select onchange="setTop(${idx}, this.value)">${opts}</select>
          <div class="pts-hint">Vị trí: <span id="pp-${idx}">${g.top !== '' ? '+'+pp+'đ' : '—'}</span></div>
        </div>
        <div class="field-wrap">
          <label>Elim (mạng)</label>
          <div class="elim-wrap" id="elim-wrap-${idx}">
            <button class="elim-btn" onclick="changeElim(${idx}, -1)">−</button>
            <input class="elim-val" type="number" min="0" max="99"
              id="elim-${idx}"
              value="${elims}"
              oninput="setElims(${idx}, this.value)">
            <button class="elim-btn" onclick="changeElim(${idx}, +1)">+</button>
          </div>
        </div>
      </div>`;

    grid.appendChild(card);
  });

  updateSummary();
}

function setTop(idx, val) {
  games[idx].top = val === '' ? '' : Number(val);
  updateCard(idx);
  updateSummary();
}

function setElims(idx, val) {
  games[idx].elims = Math.max(0, Number(val) || 0);
  updateCard(idx);
  updateSummary();
}

function changeElim(idx, delta) {
  games[idx].elims = Math.max(0, (Number(games[idx].elims) || 0) + delta);
  const input = document.getElementById(`elim-${idx}`);
  if (input) input.value = games[idx].elims;
  updateCard(idx);
  updateSummary();
}

function updateCard(idx) {
  const g = games[idx];
  const pp = g.top !== '' ? placePts(Number(g.top)) : 0;
  const elims = Number(g.elims) || 0;
  const score = pp + elims;
  const isBooyah = g.top == 1;
  const filled = g.top !== '' || elims > 0;

  const badge = document.getElementById(`badge-${idx}`);
  const ppEl = document.getElementById(`pp-${idx}`);
  const card = document.getElementById(`card-${idx}`);

  if (badge) {
    let chipClass = 'score-chip';
    if (isBooyah) chipClass += ' booyah';
    else if (score > 0) chipClass += ' active';
    badge.className = chipClass;
    badge.textContent = score > 0 ? score + 'đ' : '—';
  }
  if (ppEl) ppEl.textContent = g.top !== '' ? '+' + pp + 'đ' : '—';
  if (card) {
    card.className = 'game-card' + (filled ? ' filled' : '') + (isBooyah ? ' booyah-card' : '');
  }

  if (isBooyah && card) {
    card.classList.remove('booyah-flash');
    void card.offsetWidth;
    card.classList.add('booyah-flash');
    confetti({ particleCount: 120, spread: 80, origin: {y: 0.6},
      colors: ['#f5c842','#ff7c20','#fff','#ff4d6d','#2dd4a3'] });
    setTimeout(() => confetti({ particleCount: 60, spread: 120, origin: {y: 0.5},
      colors: ['#f5c842','#ff7c20'] }), 300);
  }
}

function updateSummary() {
  let totalElims = 0, totalPlace = 0, booyahs = 0;
  games.forEach(g => {
    totalPlace += g.top !== '' ? placePts(Number(g.top)) : 0;
    totalElims += Number(g.elims) || 0;
    if (g.top == 1) booyahs++;
  });
  const grand = totalPlace + totalElims;

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-box"><div class="stat-val">${games.length}</div><div class="stat-lbl">Số game</div></div>
    <div class="stat-box"><div class="stat-val">${totalElims}</div><div class="stat-lbl">Tổng Elim</div></div>
    <div class="stat-box"><div class="stat-val">${totalPlace}</div><div class="stat-lbl">Điểm vị trí</div></div>
    <div class="stat-box"><div class="stat-val">${booyahs} 🏆</div><div class="stat-lbl">BOOYAH</div></div>
  `;
  document.getElementById('grandTotal').textContent = grand;
}

function resetAll() {
  games = Array.from({length: numGames}, () => ({top: '', elims: 0}));
  render();
}

initGames(numGames);

// ── EXPORT ──
function exportImage() {
  let totalElims = 0, totalPlace = 0, booyahs = 0;
  games.forEach(g => {
    const pp = g.top !== '' ? placePts(Number(g.top)) : 0;
    totalPlace += pp;
    totalElims += Number(g.elims) || 0;
    if (g.top == 1) booyahs++;
  });
  const grand = totalPlace + totalElims;

  const teamName = document.getElementById('teamName').value.trim() || 'XDORZY';
  document.getElementById('ec-watermark').textContent = teamName;
  document.getElementById('ec-team').textContent = teamName;
  document.getElementById('ec-date').textContent = 'DATE: ' + new Date().toLocaleDateString('vi-VN');

  document.getElementById('ec-games').innerHTML = games.map((g, i) => {
    const pp = g.top !== '' ? placePts(Number(g.top)) : 0;
    const elims = Number(g.elims) || 0;
    const score = pp + elims;
    const isBooyah = g.top == 1;
    const topLabel = isBooyah ? 'BOOYAH' : g.top !== '' ? `#${g.top}` : '—';
    return `
      <div class="ec-game ${isBooyah ? 'booyah' : ''}">
        <div class="ec-game-num">MATCH ${i+1}</div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;">
          <div class="ec-game-top ${isBooyah ? 'bt' : ''}">${topLabel}</div>
          <div class="ec-game-elims">${elims} KILLS</div>
        </div>
        <div class="ec-game-score">+${score} PTS</div>
      </div>`;
  }).join('');

  document.getElementById('ec-stats').innerHTML = `
    <div class="ec-stat"><div class="ec-stat-val">${games.length}</div><div class="ec-stat-lbl">MATCHES</div></div>
    <div class="ec-stat"><div class="ec-stat-val">${totalElims}</div><div class="ec-stat-lbl">TOTAL KILLS</div></div>
    <div class="ec-stat"><div class="ec-stat-val">${totalPlace}</div><div class="ec-stat-lbl">PLACE PTS</div></div>
    <div class="ec-stat"><div class="ec-stat-val">${booyahs}</div><div class="ec-stat-lbl">BOOYAHS</div></div>
  `;
  document.getElementById('ec-total-val').textContent = grand;

  const btn = document.querySelector('.btn-export');
  btn.textContent = '⏳ Đang xử lý...';
  btn.disabled = true;

  setTimeout(() => {
    html2canvas(document.getElementById('exportCard'), {
      scale: 2.5, backgroundColor: '#09090b', useCORS: true, logging: false,
    }).then(canvas => {
      const link = document.createElement('a');
      link.download = `ff-score-${Date.now()}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
      btn.innerHTML = '📸 Xuất ảnh khoe';
      btn.disabled = false;
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }).catch(() => {
      btn.innerHTML = '📸 Xuất ảnh khoe';
      btn.disabled = false;
    });
  }, 100);
}
</script>
